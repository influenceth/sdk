name: Create beta version PR

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  create-beta-version:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Increment Beta Version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          BASE_VERSION=$(echo $VERSION | sed 's/-beta\.[0-9]*//')
          BETA_NUMBER=$(echo $VERSION | sed -n 's/.*-beta\.\([0-9]*\)/\1/p')
          NEW_BETA_NUMBER=$((BETA_NUMBER + 1))
          NEW_VERSION="$BASE_VERSION-beta.$NEW_BETA_NUMBER"
          npm version $NEW_VERSION --no-git-tag-version
          echo "New version: $NEW_VERSION"
          echo "NEW_VERSION=$NEW_VERSION" >> "$GITHUB_ENV"

      - name: Commit beta version
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git checkout -b "github-actions/beta-version-$NEW_VERSION"
          git add package.json package-lock.json
          git commit -m "Create beta version $NEW_VERSION"
          git push --set-upstream origin "github-actions/beta-version-$NEW_VERSION"

      - name: Open beta version PR
        run: |
          gh pr create \
            --base master \
            --head "github-actions/beta-version-$NEW_VERSION" \
            --title "Create beta version $NEW_VERSION" \
            --body "Automated beta version bump."
        env:
          GH_TOKEN: ${{ github.token }}
